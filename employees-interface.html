<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Быстрые ссылки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        
        img {
            width: 100vw;
            height: 16.666vh;
            object-fit: cover;
            display: block;
            cursor: pointer;
        }
    </style>
    <script>
        function navigateToIntent(intentUrl) {
            window.location.href = intentUrl;
        }
        
        function makeCall(phoneNumber) {
            window.location.href = 'tel:' + phoneNumber;
        }
    </script>
</head>
<body>
    <img src="1eui.png" alt="Launcher" onclick="navigateToIntent('intent://com.gogo.launcher/#Intent;scheme=android-app;end')" onerror="this.style.display='none'">
    <img src="2eui.png" alt="FoodFox" onclick="navigateToIntent('intent://ru.foodfox.vendor/#Intent;scheme=android-app;end')" onerror="this.style.display='none'">
    <img src="3eui.png" alt="Mail" onclick="navigateToIntent('intent://ru.mail.mailapp/#Intent;scheme=android-app;end')" onerror="this.style.display='none'">
    <img src="4eui.png" alt="Telegram" onclick="navigateToIntent('intent://org.telegram.messenger/#Intent;scheme=android-app;end')" onerror="this.style.display='none'">
    <img src="5eui.png" alt="Emergency" onclick="makeCall('112')" onerror="this.style.display='none'">
    <img src="6eui.png" alt="Placeholder" onerror="this.style.display='none'">
</body>
</html>
